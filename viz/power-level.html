<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Power Level - Balance Viz</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="viz.css">
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <h1 class="page-title">Power Level Balance</h1>
  <div class="layout">
    <div class="sidebar" id="controls">
      <h3>Player Power Weights</h3>
      <div id="player-weight-sliders"></div>
      <h3>Utility Weights</h3>
      <div id="utility-weight-sliders"></div>
      <h3>Enemy Power Weights</h3>
      <div id="enemy-weight-sliders"></div>
      <h3>Game Configs</h3>
      <div id="game-sliders"></div>
    </div>
    <div class="chart-area">
    <canvas id="powerChart"></canvas>
    <canvas id="ratioChart" style="margin-top: 24px;"></canvas>
    <canvas id="componentChart" style="margin-top: 24px;"></canvas>
    <canvas id="enemyComponentChart" style="margin-top: 24px;"></canvas>
  </div>
  </div>
  <script type="module">
    import { loadConfigs, getConfigValue, setConfigValue, createSlider, createCopyButton, generateConfigSnippet, saveToUrl, loadFromUrl, CHART_COLORS } from "./vizShared.js";
    import { playerDps, playerEhp, playerUtility, playerPower, enemyEhp, enemyDps, spawnPower, enemyPower } from "../src/upgrades/power.js";
import { enemyContactDamageScale } from "../src/upgrades/difficulty.js";

    const configs = await loadConfigs();

    const PLAYER_WEIGHT_PATHS = [
      { path: "POWER.wDPS", label: "DPS Weight", min: 0, max: 3, step: 0.1 },
      { path: "POWER.wEHP", label: "EHP Weight", min: 0, max: 3, step: 0.1 },
      { path: "POWER.wUtility", label: "Utility Weight", min: 0, max: 3, step: 0.1 },
      { path: "POWER.ehpRegenWindow", label: "EHP Regen Window", min: 5, max: 120, step: 5 }
    ];

    const UTILITY_WEIGHT_PATHS = [
      { path: "POWER.homingWeight", label: "Homing", min: 0, max: 5, step: 0.5 },
      { path: "POWER.bounceWeight", label: "Bounce", min: 0, max: 5, step: 0.5 },
      { path: "POWER.pickupWeight", label: "Pickup", min: 0, max: 2, step: 0.1 },
      { path: "POWER.speedWeight", label: "Speed", min: 0, max: 2, step: 0.1 }
    ];

    const ENEMY_WEIGHT_PATHS = [
      { path: "POWER.wEnemyDPS", label: "Enemy DPS Wt", min: 0, max: 3, step: 0.1 },
      { path: "POWER.wEnemyEHP", label: "Enemy EHP Wt", min: 0, max: 3, step: 0.1 },
      { path: "POWER.wSpawn", label: "Spawn Wt", min: 0, max: 3, step: 0.1 },
      { path: "POWER.enemyContactRate", label: "Contact Rate", min: 0.1, max: 3, step: 0.1 }
    ];

const GAME_PATHS = [
  { path: "PLAYER.baseDamage", label: "Base Damage", min: 0.5, max: 3, step: 0.1 },
  { path: "PLAYER.baseShotCooldown", label: "Shot Cooldown", min: 0.1, max: 0.5, step: 0.02 },
  { path: "PLAYER.baseHealth", label: "Base Health", min: 50, max: 200, step: 10 },
  { path: "DIFFICULTY.halfTime", label: "Half Time", min: 60, max: 900, step: 30 },
  { path: "DIFFICULTY.exponent", label: "Exponent", min: 1.0, max: 3.0, step: 0.1 },
  { path: "DIFFICULTY.enemyHealthCoefficient", label: "Enemy HP Coeff", min: 1, max: 10, step: 0.5 },
  { path: "DIFFICULTY.damageScaleCoefficient", label: "Dmg Scale Coeff", min: 0.1, max: 4, step: 0.1 },
  { path: "DIFFICULTY.enemyContactDamageCoefficient", label: "Contact Dmg Coeff", min: 0, max: 5, step: 0.25 },
  { path: "WEAPONS.multishotBurstDelayPercent", label: "Burst Delay %", min: 0.02, max: 0.2, step: 0.01 }
];

    const ALL_PATHS = [...PLAYER_WEIGHT_PATHS, ...UTILITY_WEIGHT_PATHS, ...ENEMY_WEIGHT_PATHS, ...GAME_PATHS].map(s => s.path);

    loadFromUrl(configs, ALL_PATHS);

    function onSliderChange(path, v) {
      setConfigValue(configs, path, v);
      saveToUrl(configs, ALL_PATHS);
      updateCharts();
    }

    for (const s of PLAYER_WEIGHT_PATHS) createSlider(document.getElementById("player-weight-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));
    for (const s of UTILITY_WEIGHT_PATHS) createSlider(document.getElementById("utility-weight-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));
    for (const s of ENEMY_WEIGHT_PATHS) createSlider(document.getElementById("enemy-weight-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));
    for (const s of GAME_PATHS) createSlider(document.getElementById("game-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));

    createCopyButton(document.getElementById("controls"), () => generateConfigSnippet(configs, ALL_PATHS));

    function mockMetaRun(fireRateLv, damageLv, multishotLv, frontLv, time) {
      return {
        meta: { upgrades: { fireRate: fireRateLv, damage: damageLv } },
        run: {
          time,
          temporaryUpgrades: {
            multishot: multishotLv,
            frontShot: frontLv,
            diagonalShot: 0,
            reverseShot: 0,
            homing: 0,
            projectileBounce: 0
          },
          selectedExtraShots: new Set(["multishot", "frontShot"]),
          extraShotRarities: {}
        }
      };
    }

    const UPGRADE_PROFILES = [
      { label: "0 upgrades", fireRate: 0, damage: 0, multishot: 0, front: 0, color: CHART_COLORS.cyan, dash: [] },
      { label: "5 dmg / 5 rate", fireRate: 5, damage: 5, multishot: 0, front: 0, color: CHART_COLORS.green, dash: [] },
      { label: "10 dmg / 10 rate", fireRate: 10, damage: 10, multishot: 0, front: 0, color: CHART_COLORS.purple, dash: [] },
      { label: "10/10 + multishot 2", fireRate: 10, damage: 10, multishot: 2, front: 0, color: CHART_COLORS.pink, dash: [5, 5] },
      { label: "10/10 + front 2", fireRate: 10, damage: 10, multishot: 0, front: 2, color: CHART_COLORS.yellow, dash: [5, 5] }
    ];

    const timeLabels = Array.from({ length: 60 }, (_, i) => i * 10);

    const ctx1 = document.getElementById("powerChart").getContext("2d");
    const chart1 = new Chart(ctx1, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          ...UPGRADE_PROFILES.map(p => ({
            label: `Player: ${p.label}`,
            data: [],
            borderColor: p.color,
            fill: false,
            tension: 0.3,
            borderDash: p.dash
          })),
          {
            label: "Enemy Power",
            data: [],
            borderColor: CHART_COLORS.orange,
            fill: false,
            tension: 0.3
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#8899aa" } },
          title: { display: true, text: "Player vs Enemy Power Over Time", color: "#8899aa" }
        },
        scales: {
          x: { title: { display: true, text: "Time (s)", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } },
          y: { title: { display: true, text: "Power Level", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } }
        }
      }
    });

    const ctx2 = document.getElementById("ratioChart").getContext("2d");
    const chart2 = new Chart(ctx2, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          ...UPGRADE_PROFILES.map(p => ({
            label: `Ratio: ${p.label}`,
            data: [],
            borderColor: p.color,
            fill: false,
            tension: 0.3,
            borderDash: p.dash
          })),
          {
            label: "Balanced (1.0)",
            data: [],
            borderColor: "#556677",
            borderDash: [8, 4],
            fill: false,
            pointRadius: 0,
            tension: 0
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#8899aa" } },
          title: { display: true, text: "Power Ratio (Player / Enemy)", color: "#8899aa" }
        },
        scales: {
          x: { title: { display: true, text: "Time (s)", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } },
          y: { title: { display: true, text: "Ratio", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } }
        }
      }
    });

const ctx3 = document.getElementById("componentChart").getContext("2d");
const chart3 = new Chart(ctx3, {
  type: "line",
  data: {
    labels: [],
    datasets: [
      { label: "DPS Component", data: [], borderColor: CHART_COLORS.pink, fill: false, tension: 0.2 },
      { label: "EHP Component", data: [], borderColor: CHART_COLORS.cyan, fill: false, tension: 0.2 },
      { label: "Utility Component", data: [], borderColor: CHART_COLORS.green, fill: false, tension: 0.2 },
      { label: "Total Power", data: [], borderColor: CHART_COLORS.white, fill: false, tension: 0.2, borderDash: [4, 4] }
    ]
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: "#8899aa" } }, title: { display: true, text: "Power Component Breakdown by Upgrade Level (t=300s)", color: "#8899aa" } },
    scales: {
      x: { title: { display: true, text: "Upgrade Level", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } },
      y: { title: { display: true, text: "Component Value", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } }
    }
  }
});

const ctx4 = document.getElementById("enemyComponentChart").getContext("2d");
const chart4 = new Chart(ctx4, {
  type: "line",
  data: {
    labels: [],
    datasets: [
      { label: "Enemy DPS (contact)", data: [], borderColor: CHART_COLORS.pink, fill: false, tension: 0.3 },
      { label: "Enemy EHP (spawn avg)", data: [], borderColor: CHART_COLORS.cyan, fill: false, tension: 0.3 },
      { label: "Spawn Rate Power", data: [], borderColor: CHART_COLORS.green, fill: false, tension: 0.3 },
      { label: "Contact Dmg Scale", data: [], borderColor: CHART_COLORS.yellow, fill: false, tension: 0.3, borderDash: [5, 5] },
      { label: "Total Enemy Power", data: [], borderColor: CHART_COLORS.orange, fill: false, tension: 0.3 }
    ]
  },
  options: {
    responsive: true,
    plugins: { legend: { labels: { color: "#8899aa" } }, title: { display: true, text: "Enemy Power Components Over Time", color: "#8899aa" } },
    scales: {
      x: { title: { display: true, text: "Time (s)", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } },
      y: { title: { display: true, text: "Value", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } }
    }
  }
});

    function updateCharts() {
      chart1.data.labels = timeLabels.map(t => `${t}s`);
      UPGRADE_PROFILES.forEach((profile, i) => {
        chart1.data.datasets[i].data = timeLabels.map(t => {
          const { meta, run } = mockMetaRun(profile.fireRate, profile.damage, profile.multishot, profile.front, t);
          return playerPower(meta, run);
        });
      });
      chart1.data.datasets[UPGRADE_PROFILES.length].data = timeLabels.map(t => enemyPower(t));
      chart1.update("none");

      chart2.data.labels = timeLabels.map(t => `${t}s`);
      UPGRADE_PROFILES.forEach((profile, i) => {
        chart2.data.datasets[i].data = timeLabels.map(t => {
          const { meta, run } = mockMetaRun(profile.fireRate, profile.damage, profile.multishot, profile.front, t);
          const ePow = enemyPower(t);
          return ePow > 0 ? playerPower(meta, run) / ePow : 0;
        });
      });
      chart2.data.datasets[UPGRADE_PROFILES.length].data = timeLabels.map(() => 1.0);
      chart2.update("none");

      const levels = Array.from({ length: 21 }, (_, i) => i);
      const fixedTime = 300;
      chart3.data.labels = levels.map(l => `Lv ${l}`);
      chart3.data.datasets[0].data = levels.map(l => {
        const { meta, run } = mockMetaRun(l, l, 0, 0, fixedTime);
        return getConfigValue(configs, "POWER.wDPS") * playerDps(meta, run);
      });
      chart3.data.datasets[1].data = levels.map(l => {
        const { meta, run } = mockMetaRun(l, l, 0, 0, fixedTime);
        return getConfigValue(configs, "POWER.wEHP") * playerEhp(meta, run);
      });
      chart3.data.datasets[2].data = levels.map(l => {
        const { meta, run } = mockMetaRun(l, l, 0, 0, fixedTime);
        return getConfigValue(configs, "POWER.wUtility") * playerUtility(meta, run);
      });
  chart3.data.datasets[3].data = levels.map(l => {
    const { meta, run } = mockMetaRun(l, l, 0, 0, fixedTime);
    return playerPower(meta, run);
  });
  chart3.update("none");

  const wEnemyDPS = getConfigValue(configs, "POWER.wEnemyDPS");
  const wEnemyEHP = getConfigValue(configs, "POWER.wEnemyEHP");
  const wSpawn = getConfigValue(configs, "POWER.wSpawn");
  chart4.data.labels = timeLabels.map(t => `${t}s`);
  chart4.data.datasets[0].data = timeLabels.map(t => wEnemyDPS * enemyDps(t));
  chart4.data.datasets[1].data = timeLabels.map(t => wEnemyEHP * spawnPower(t));
  chart4.data.datasets[2].data = timeLabels.map(t => wSpawn * spawnPower(t));
  chart4.data.datasets[3].data = timeLabels.map(t => enemyContactDamageScale(t));
  chart4.data.datasets[4].data = timeLabels.map(t => enemyPower(t));
  chart4.update("none");
}

    updateCharts();
  </script>
</body>
</html>
