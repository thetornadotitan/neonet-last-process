<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Difficulty Scaling - Balance Viz</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="viz.css">
</head>
<body>
  <a class="back-link" href="index.html">&larr; Back</a>
  <h1 class="page-title">Difficulty Scaling</h1>
  <div class="layout">
    <div class="sidebar" id="controls">
      <h3>Curve Shape</h3>
      <div id="curve-sliders"></div>
      <h3>Scaling Coefficients</h3>
      <div id="coeff-sliders"></div>
      <h3>Spawn & Speed</h3>
      <div id="spawn-sliders"></div>
    </div>
    <div class="chart-area">
      <canvas id="chart1"></canvas>
      <canvas id="chart2" style="margin-top: 24px;"></canvas>
    </div>
  </div>
  <script type="module">
    import { loadConfigs, getConfigValue, setConfigValue, createSlider, createCopyButton, generateConfigSnippet, saveToUrl, loadFromUrl, CHART_COLORS } from "./vizShared.js";

    const CURVE_PATHS = [
      { path: "DIFFICULTY.halfTime", label: "Half Time", min: 60, max: 900, step: 30 },
      { path: "DIFFICULTY.exponent", label: "Exponent", min: 1.0, max: 3.0, step: 0.1 }
    ];

    const COEFF_PATHS = [
      { path: "DIFFICULTY.enemyHealthCoefficient", label: "Health Coeff", min: 0.5, max: 10, step: 0.5 },
      { path: "DIFFICULTY.damageScaleCoefficient", label: "Dmg Scale Coeff", min: 0.1, max: 4, step: 0.1 },
      { path: "DIFFICULTY.enemyContactDamageCoefficient", label: "Contact Dmg Coeff", min: 0, max: 5, step: 0.25 }
    ];

    const SPAWN_PATHS = [
      { path: "DIFFICULTY.enemySpeedCoefficient", label: "Speed Coeff", min: 0.1, max: 1, step: 0.05 },
      { path: "DIFFICULTY.enemySpeedCap", label: "Speed Cap", min: 0.5, max: 3, step: 0.1 },
      { path: "DIFFICULTY.spawnDelayStart", label: "Spawn Delay Start", min: 0.3, max: 2, step: 0.05 },
      { path: "DIFFICULTY.spawnDelayRate", label: "Spawn Delay Rate", min: 0.001, max: 0.03, step: 0.001 },
      { path: "DIFFICULTY.spawnDelayMin", label: "Spawn Delay Min", min: 0.05, max: 0.5, step: 0.01 }
    ];

    const ALL_PATHS = [...CURVE_PATHS, ...COEFF_PATHS, ...SPAWN_PATHS].map(s => s.path);

    const configs = await loadConfigs();
    loadFromUrl(configs, ALL_PATHS);

    function onSliderChange(path, v) {
      setConfigValue(configs, path, v);
      saveToUrl(configs, ALL_PATHS);
      updateCharts();
    }

    for (const s of CURVE_PATHS) createSlider(document.getElementById("curve-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));
    for (const s of COEFF_PATHS) createSlider(document.getElementById("coeff-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));
    for (const s of SPAWN_PATHS) createSlider(document.getElementById("spawn-sliders"), s.label, s.min, s.max, s.step, getConfigValue(configs, s.path), "", v => onSliderChange(s.path, v));

    createCopyButton(document.getElementById("controls"), () => generateConfigSnippet(configs, ALL_PATHS));

    function difficultyFor(time) {
      if (time <= 0) return 0;
      const halfTime = getConfigValue(configs, "DIFFICULTY.halfTime");
      const exponent = getConfigValue(configs, "DIFFICULTY.exponent");
      return Math.pow(time / halfTime, exponent);
    }

    const timeLabels = Array.from({ length: 90 }, (_, i) => i * 10);

    const ctx1 = document.getElementById("chart1").getContext("2d");
    const chart1 = new Chart(ctx1, {
      type: "line",
      data: {
        labels: timeLabels.map(t => `${t}s`),
        datasets: [
          { label: "Difficulty", data: [], borderColor: CHART_COLORS.white, fill: false, tension: 0.3 },
          { label: "Enemy Health Scale", data: [], borderColor: CHART_COLORS.pink, fill: false, tension: 0.3 },
          { label: "Damage Scale (player)", data: [], borderColor: CHART_COLORS.orange, fill: false, tension: 0.3 },
          { label: "Contact Dmg Scale", data: [], borderColor: CHART_COLORS.purple, fill: false, tension: 0.3, borderDash: [5, 5] }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#8899aa" } }, title: { display: true, text: "Difficulty & Scaling Multipliers", color: "#8899aa" } },
        scales: {
          x: { title: { display: true, text: "Time (s)", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } },
          y: { title: { display: true, text: "Multiplier", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } }
        }
      }
    });

    const ctx2 = document.getElementById("chart2").getContext("2d");
    const chart2 = new Chart(ctx2, {
      type: "line",
      data: {
        labels: timeLabels.map(t => `${t}s`),
        datasets: [
          { label: "Enemy Speed Scale", data: [], borderColor: CHART_COLORS.yellow, fill: false, tension: 0.3 },
          { label: "Spawn Delay (s)", data: [], borderColor: CHART_COLORS.green, fill: false, tension: 0.3 }
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { labels: { color: "#8899aa" } }, title: { display: true, text: "Enemy Speed & Spawn Rate", color: "#8899aa" } },
        scales: {
          x: { title: { display: true, text: "Time (s)", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } },
          y: { title: { display: true, text: "Value", color: "#8899aa" }, ticks: { color: "#8899aa" }, grid: { color: "#1a2040" } }
        }
      }
    });

    function updateCharts() {
      const hc = getConfigValue(configs, "DIFFICULTY.enemyHealthCoefficient");
      const dc = getConfigValue(configs, "DIFFICULTY.damageScaleCoefficient");
      const cc = getConfigValue(configs, "DIFFICULTY.enemyContactDamageCoefficient");
      const sc = getConfigValue(configs, "DIFFICULTY.enemySpeedCoefficient");
      const cap = getConfigValue(configs, "DIFFICULTY.enemySpeedCap");
      const ds = getConfigValue(configs, "DIFFICULTY.spawnDelayStart");
      const dr = getConfigValue(configs, "DIFFICULTY.spawnDelayRate");
      const dm = getConfigValue(configs, "DIFFICULTY.spawnDelayMin");

      const diff = timeLabels.map(t => difficultyFor(t));
      const healthScale = diff.map(d => 1 + d * hc);
      const dmgScale = diff.map(d => 1 + d * dc);
      const contactScale = diff.map(d => 1 + d * cc);
      const speedScale = diff.map(d => 1 + Math.min(d * sc, cap));
      const spawnDelay = timeLabels.map(t => Math.max(dm, Math.min(ds, ds - t * dr)));

      chart1.data.datasets[0].data = diff;
      chart1.data.datasets[1].data = healthScale;
      chart1.data.datasets[2].data = dmgScale;
      chart1.data.datasets[3].data = contactScale;
      chart1.update("none");

      chart2.data.datasets[0].data = speedScale;
      chart2.data.datasets[1].data = spawnDelay;
      chart2.update("none");
    }

    updateCharts();
  </script>
</body>
</html>
